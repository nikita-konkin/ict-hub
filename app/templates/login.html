{% extends "base.html" %}

{% block title %}Sign In — ConverterHub{% endblock %}

{% block content %}
<div style="width:380px;">
  <!-- Brand header above the card -->
  <div style="text-align:center; margin-bottom:40px;">
    <div style="font-family:var(--font-display); font-size:30px; font-weight:400; color:var(--accent); letter-spacing:0.02em;">
      ConverterHub
    </div>
    <div style="font-size:11px; color:var(--text-muted); letter-spacing:0.14em; text-transform:uppercase; margin-top:6px;">
      Data Processing Suite
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title" style="font-size:16px;">Sign in to your account</div>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger" style="margin-bottom:20px;">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            autofocus
            required
          >
        </div>

        <div class="form-group" style="margin-bottom:28px;">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
          Continue
        </button>
      </form>
    </div>
  </div>

  <p style="text-align:center; margin-top:20px; font-size:11px; color:var(--text-dim);">
    Access restricted to authorised users only.
  </p>
</div>
{% endblock %}
