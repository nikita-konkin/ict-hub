<!--
  job_panel.html — HTMX fragment (not a full page).

  This snippet is returned by POST /jobs/start and swapped into #job-output
  by HTMX. The hx-ext="sse" attribute causes the HTMX SSE extension to
  immediately open an event-stream connection to /jobs/{id}/stream.

  Event routing (sse-swap attribute on child elements):
    "log"      → appended to #log-lines
    "progress" → replaces inner content of #progress-fill-wrap
    "done"     → replaces #job-status, sse-close closes the connection
    "error"    → replaces #job-status
-->
<div id="job-panel-{{ job.id }}" data-stream-url="/jobs/{{ job.id }}/stream">

  <!-- Header row: job metadata + stop button -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-body" style="padding:16px 20px;">
      <div class="flex-between">
        <div>
          <span style="font-family:var(--font-mono); font-size:11px; color:var(--text-dim);">
            JOB #{{ job.id }}
          </span>
          <div style="font-family:var(--font-display); font-size:18px; color:var(--text); margin-top:2px;">
            {{ converter.label }}
          </div>
        </div>

        <div class="flex-center gap-sm">
          <!-- Status badge — swapped by the "done" SSE event -->
          <div id="job-status">
            <span class="badge badge-running">Running</span>
          </div>

          <!-- Stop button: POST without HTMX navigation (full redirect) -->
          <form method="POST" action="/jobs/{{ job.id }}/stop" style="display:inline;">
            <button type="submit" class="btn btn-danger" style="padding:6px 12px; font-size:11px;">
              Stop
            </button>
          </form>
        </div>
      </div>

      <!-- Progress bar — swapped by "progress" events -->
      <div style="margin-top:14px;">
        <div class="flex-between" style="margin-bottom:6px;">
          <span style="font-size:10px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase;">
            Progress
          </span>
          <span id="progress-label" style="font-family:var(--font-mono); font-size:10px; color:var(--text-muted);">
            —
          </span>
        </div>
        <div class="progress-track">
          <div id="progress-fill-wrap" style="height:100%;">
            <!-- Indeterminate animation until real progress arrives -->
            <div class="progress-fill indeterminate"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Log output -->
  <div class="card">
    <div class="card-header" style="padding:12px 20px; display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);">
        Log output
      </span>
      <button
        onclick="(function(btn){const panel=btn.closest('[id^=job-panel-]');const el=panel&&panel.querySelector('.log-panel');if(el){el.scrollTop=el.scrollHeight;}})(this)"
        class="btn btn-ghost"
        style="padding:3px 10px; font-size:10px;"
      >
        ↓ Scroll to bottom
      </button>
    </div>

    <div
      id="log-lines"
      class="log-panel"
    >
      <span class="log-line" style="color:var(--text-dim);">Connecting to container…</span>
    </div>
  </div>

</div>

<!-- OOB (out-of-band) swap: update the "done" status badge with correct text -->
<script>
  (function () {
    if (typeof window.initializeAllJobPanels === "function") {
      window.initializeAllJobPanels(document);
    }
  })();
</script>
